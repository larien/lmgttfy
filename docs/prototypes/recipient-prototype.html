  <script>
  (function() {
    const SOURCE_TEXT = "I need this translated by Friday";
    const TARGET_TEXT = "Preciso disso traduzido até sexta-feira";
    const SOURCE_LANG = "English";
    const TARGET_LANG = "Portuguese";
  
    const REVEAL_LINES = [
      "You're welcome.",
      "There. Was that so hard?",
      "Next time, try this yourself.",
      "Imagine having access to the entire internet.",
      "We believe in you. Eventually.",
      "Hope this helps! 🙂",
      "You watched this whole thing instead of just translating it.",
      "Bookmark it. Please.",
      "Glad we could help. We shouldn't have had to.",
      "This took longer to make than for you to do it yourself.",
      "Mission accomplished. Sort of.",
      "Crisis averted. Effort: minimal.",
      "There you go, champ.",
      "And that's how the internet works."
    ];
  
    const SKIP_LINES = [
      "Skip — I understand how websites work",
      "Skip — I'll pretend I learned something",
      "Skip to the part where you're welcome",
      "Skip — my time is valuable, unlike my effort",
      "Skip — yes, I get it, I'm capable"
    ];
  
    // Utility: random in range
    const rand = (min, max) => Math.random() * (max - min) + min;
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));
  
    // Cursor element + theme handling
    const cursor = document.getElementById('cursor');
    let cursorX = 100, cursorY = 100;
  
    const THEMES = ['warm', 'dark', 'y2k', 'terminal'];
    let currentTheme = 'warm';
  
    // Sender-chosen theme (would come from URL in production)
    // Try ?theme=y2k or default to warm
    const urlParams = new URLSearchParams(window.location.search);
    const senderTheme = urlParams.get('theme');
    if (senderTheme && THEMES.includes(senderTheme)) {
      currentTheme = senderTheme;
    }
  
    function setCursorSvg() {
      const styles = getComputedStyle(document.body);
      const color = styles.getPropertyValue('--cursor-color').trim() || 'black';
      const stroke = styles.getPropertyValue('--cursor-stroke').trim() || 'white';
      const svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 18 24'><path d='M2 2 L2 18 L6 14 L9 21 L11 20 L8 13 L14 13 Z' fill='${color}' stroke='${stroke}' stroke-width='1.2' stroke-linejoin='round'/></svg>`;
      cursor.style.backgroundImage = `url("data:image/svg+xml;utf8,${encodeURIComponent(svg)}")`;
    }
  
    function applyTheme(theme) {
      THEMES.forEach(t => document.body.classList.remove('theme-' + t));
      if (theme !== 'warm') document.body.classList.add('theme-' + theme);
      currentTheme = theme;
      setCursorSvg();
      updateActiveSwatch();
    }
  
    function updateActiveSwatch() {
      document.querySelectorAll('.swatch').forEach(s => {
        s.classList.toggle('active', s.dataset.theme === currentTheme);
      });
    }
  
    document.querySelectorAll('.swatch').forEach(swatch => {
      swatch.addEventListener('click', () => {
        applyTheme(swatch.dataset.theme);
      });
    });
  
    applyTheme(currentTheme);
  
    function setCursor(x, y) {
      cursorX = x; cursorY = y;
      cursor.style.transform = `translate(${x}px, ${y}px)`;
    }
  
    // Initial position
    setCursor(60, 80);
  
    async function moveCursorTo(targetX, targetY, duration = 700) {
      // Slight overshoot for human feel
      const overshoot = Math.random() < 0.35;
      const startX = cursorX, startY = cursorY;
      const finalX = targetX + rand(-2, 2);
      const finalY = targetY + rand(-2, 2);
  
      const overshootX = finalX + (Math.random() < 0.5 ? -1 : 1) * rand(4, 10);
      const overshootY = finalY + (Math.random() < 0.5 ? -1 : 1) * rand(2, 6);
  
      const phase1 = overshoot ? duration * 0.85 : duration;
      const steps1 = Math.max(20, Math.floor(phase1 / 16));
  
      // cubic-bezier ease (approximation)
      const ease = (t) => {
        // ease-in-out cubic
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      };
  
      const targetXPhase1 = overshoot ? overshootX : finalX;
      const targetYPhase1 = overshoot ? overshootY : finalY;
  
      for (let i = 1; i <= steps1; i++) {
        const t = ease(i / steps1);
        // small jitter
        const jitterX = rand(-0.4, 0.4);
        const jitterY = rand(-0.4, 0.4);
        setCursor(
          startX + (targetXPhase1 - startX) * t + jitterX,
          startY + (targetYPhase1 - startY) * t + jitterY
        );
        await sleep(16);
      }
  
      if (overshoot) {
        const phase2 = duration * 0.15;
        const steps2 = Math.max(8, Math.floor(phase2 / 16));
        const sx = cursorX, sy = cursorY;
        for (let i = 1; i <= steps2; i++) {
          const t = ease(i / steps2);
          setCursor(
            sx + (finalX - sx) * t,
            sy + (finalY - sy) * t
          );
          await sleep(16);
        }
      }
  
      // Tiny idle wobble
      await sleep(rand(80, 180));
    }
  
    function getRect(el) {
      const r = el.getBoundingClientRect();
      return {
        x: r.left + r.width / 2,
        y: r.top + r.height / 2,
        left: r.left,
        top: r.top,
        width: r.width,
        height: r.height
      };
    }
  
    async function clickElement(el) {
      el.style.transition = 'transform 0.08s';
      el.style.transform = 'scale(0.985)';
      await sleep(90);
      el.style.transform = 'scale(1)';
    }
  
    function showDropdown(anchorEl) {
      const dropdown = document.getElementById('dropdown');
      const rect = anchorEl.getBoundingClientRect();
      const appRect = document.getElementById('app').getBoundingClientRect();
      dropdown.style.left = (rect.left - appRect.left) + 'px';
      dropdown.style.top = (rect.bottom - appRect.top + 4) + 'px';
      dropdown.style.width = rect.width + 'px';
      dropdown.classList.add('visible');
    }
  
    function hideDropdown() {
      document.getElementById('dropdown').classList.remove('visible');
    }
  
    async function selectLanguage(selectEl, langName) {
      selectEl.classList.add('active');
      const rect = getRect(selectEl);
      await moveCursorTo(rect.x, rect.y, rand(600, 850));
      await clickElement(selectEl);
      showDropdown(selectEl);
      await sleep(rand(300, 500));
  
      // Find and "hover" through items before clicking target
      const items = document.querySelectorAll('.dd-item');
      const targetItem = Array.from(items).find(i => i.dataset.lang === langName);
  
      // Simulate scanning a couple items
      const scanTargets = [items[0], items[Math.min(2, items.length - 1)], targetItem];
      for (const item of scanTargets) {
        items.forEach(i => i.classList.remove('highlighted'));
        item.classList.add('highlighted');
        const ir = getRect(item);
        await moveCursorTo(ir.x, ir.y, rand(250, 420));
      }
  
      await sleep(rand(150, 300));
      await clickElement(targetItem);
      selectEl.querySelector('.lang-label').textContent = langName;
      hideDropdown();
      selectEl.classList.remove('active');
      await sleep(rand(200, 400));
    }
  
    async function typeText(text) {
      const srcText = document.getElementById('srcText');
      const tgtText = document.getElementById('tgtText');
      const caret = document.getElementById('srcCaret');
  
      // Click into the panel first
      const panel = srcText.parentElement;
      const pr = getRect(panel);
      await moveCursorTo(pr.left + 30, pr.top + 30, rand(500, 700));
      await clickElement(panel);
  
      caret.classList.add('visible');
  
      // Position caret next to text
      const updateCaret = () => {
        const range = document.createRange();
        if (srcText.firstChild) {
          range.selectNodeContents(srcText);
          range.collapse(false);
          const rect = range.getBoundingClientRect();
          const panelRect = panel.getBoundingClientRect();
          caret.style.left = (rect.right - panelRect.left + 16) + 'px';
          caret.style.top = (rect.top - panelRect.top + 16) + 'px';
        } else {
          caret.style.left = '16px';
          caret.style.top = '16px';
        }
      };
      updateCaret();
  
      // Live translation: maps source progress to target progress proportionally,
      // but with a slight lag and word-boundary snapping
      const targetWords = TARGET_TEXT.split(' ');
  
      for (let i = 0; i < text.length; i++) {
        srcText.textContent = text.substring(0, i + 1);
        updateCaret();
  
        // Live update target — snap to nearest word boundary based on progress
        const progress = (i + 1) / text.length;
        // lag the translation slightly
        const laggedProgress = Math.max(0, progress - 0.08);
        const targetCharCount = Math.floor(TARGET_TEXT.length * laggedProgress);
        // snap to word boundary
        let snapped = TARGET_TEXT.substring(0, targetCharCount);
        const lastSpace = snapped.lastIndexOf(' ');
        if (lastSpace > 0 && targetCharCount < TARGET_TEXT.length) {
          snapped = TARGET_TEXT.substring(0, lastSpace);
        }
        tgtText.textContent = snapped;
  
        // Variable typing rhythm
        let delay = rand(70, 130);
        // occasional thinking pause
        if (Math.random() < 0.05) delay = rand(200, 350);
        // very rare longer pause
        if (Math.random() < 0.015) delay = rand(400, 600);
        // pause longer on spaces
        if (text[i] === ' ') delay = rand(120, 220);
        await sleep(delay);
      }
  
      // Final translation appears fully
      await sleep(rand(300, 500));
      tgtText.textContent = TARGET_TEXT;
      caret.classList.remove('visible');
      await sleep(800);
    }
  
    // Reveal screen
    function pickRevealLine(exclude) {
      const pool = REVEAL_LINES.filter(l => l !== exclude);
      return pool[Math.floor(Math.random() * pool.length)];
    }
  
    let lastRevealLine = null;
    function showReveal() {
      const reveal = document.getElementById('reveal');
      const line = document.getElementById('revealLine');
      lastRevealLine = pickRevealLine(lastRevealLine);
      line.textContent = lastRevealLine;
      document.getElementById('revealBtn').href =
        `https://translate.google.com/?sl=auto&tl=pt&text=${encodeURIComponent(SOURCE_TEXT)}&op=translate`;
      reveal.classList.add('visible');
      document.getElementById('skipBtn').style.display = 'none';
    }
  
    document.getElementById('revealLine').addEventListener('click', () => {
      const line = document.getElementById('revealLine');
      lastRevealLine = pickRevealLine(lastRevealLine);
      line.textContent = lastRevealLine;
    });
  
    // Skip button
    function setSkipLine() {
      const btn = document.getElementById('skipBtn');
      btn.textContent = SKIP_LINES[Math.floor(Math.random() * SKIP_LINES.length)];
    }
    setSkipLine();
    document.getElementById('skipBtn').addEventListener('click', showReveal);
  
    // Main sequence
    async function run() {
      await sleep(600);
      await selectLanguage(document.getElementById('srcLang'), SOURCE_LANG);
      await selectLanguage(document.getElementById('tgtLang'), TARGET_LANG);
      await typeText(SOURCE_TEXT);
      showReveal();
    }
  
    run();
  })();
  </script>
